<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERPUNK 2037</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png">
  <style>
    .top-yellow-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background-color: #f7ba00;
      display: flex;
      align-items: center;
      padding-left: 20px;
      z-index: 999;
    }
    .top-yellow-bar a {
      color: #000;
      font-weight: bold;
      text-decoration: none;
      font-size: 16px;
    }
    body {
      padding-top: 50px;
      margin: 0;
    }

    /* 留言板样式 简约兼容版 */
    .msg-box {
      width: 90%;
      max-width: 600px;
      margin: 30px auto;
      padding: 15px;
      box-sizing: border-box;
    }
    .msg-title {
      font-size: 20px;
      text-align: center;
      margin: 0 0 15px;
      font-family: 'Rajdhani', sans-serif;
    }
    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }
    #msgInput {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
    }
    #sendBtn {
      padding: 8px 16px;
      background: #f7ba00;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .msg-list {
      min-height: 100px;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }
    .msg-item {
      padding: 4px 0;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="top-yellow-bar">
  <a href="https://www.cyberpunk.net/us/en/" target="_blank">Cyberpunk</a>
</div>

<!-- 已补全audio闭合标签，语法规范 -->
<audio id="bgm" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">


<div class="container">
  <h1 class="glitch" data-text="CYBERPUNK 2037">CYBERPUNK 2037</h1>
  <h2 class="subglitch">Jarvis · Terminal Song</h2>
  <div class="nav">
    <a href="character.html" class="btn">CHARACTER</a>
    <a href="background.html" class="btn">BACKGROUND</a>
    <a href="weapon.html" class="btn">WEAPON</a>
    <a href="collection.html" class="btn">COLLECTION</a>
  </div>

  <!-- 留言区域 -->
  <div class="msg-box">
    <div class="msg-title">留言区</div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="请输入留言...">
      <button id="sendBtn">发送</button>
    </div>
    <div class="msg-list" id="msgList"></div>
  </div>

  <div class="footer">
    <p>© 2037 NIGHT CITY CORPORATION · ALL RIGHTS RESERVED</p>
  </div>
</div>

<script>
// 背景音乐
const audio = document.getElementById("bgm");
document.addEventListener("click", function() {
  if (audio.paused) {
    audio.play();
  }
});

// 留言功能
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const msgList = document.getElementById('msgList');

// 读取本地留言并渲染
function renderMsg() {
  let msgData = localStorage.getItem('msgData');
  let msgArr = msgData ? JSON.parse(msgData) : [];
  msgList.innerHTML = '';
  msgArr.forEach(function(text) {
    let item = document.createElement('div');
    item.className = 'msg-item';
    item.innerText = text;
    msgList.appendChild(item);
  });
}

// 页面初始化加载留言
renderMsg();

// 点击发送留言
sendBtn.onclick = function() {
  let content = msgInput.value.trim();
  if (content === '') return;

  let msgArr = localStorage.getItem('msgData') ? JSON.parse(localStorage.getItem('msgData')) : [];
  msgArr.push(content);
  localStorage.setItem('msgData', JSON.stringify(msgArr));
  
  msgInput.value = '';
  renderMsg();
};

// 回车键发送留言
msgInput.onkeydown = function(e) {
  if (e.keyCode === 13) {
    sendBtn.click();
  }
};
</script>

</body>
</html>
