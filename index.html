<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERPUNK 2037</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png">
  <style>
    /* 顶部纯黄导航条 无任何图片 */
    .top-yellow-bar {
      width: 100%;
      height: 50px;
      background: #f7ba00;
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 999;
    }
    .top-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #000;
      text-decoration: none;
      letter-spacing: 2px;
      transition: all 0.2s ease;
    }
    .top-text:hover {
      color: #333;
    }
    .top-text:active {
      transform: scale(0.95);
    }
    body {
      padding-top: 60px;
      margin: 0;
    }
  </style>
</head>
<body>

<!-- 顶部黄色导航条 -->
<div class="top-yellow-bar">
  <a class="top-text" href="https://www.cyberpunk.net/us/en/" target="_blank">Cyberpunk</a>
</div>

<audio id="bgm" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">


<div class="container">
  <h1 class="glitch" data-text="CYBERPUNK 2037">CYBERPUNK 2037</h1>
  <h2 class="subglitch">Jarvis · Terminal Song</h2>
  <div class="nav">
    <a href="character.html" class="btn">CHARACTER</a>
    <a href="background.html" class="btn">BACKGROUND</a>
    <a href="weapon.html" class="btn">WEAPON</a>
    <a href="collection.html" class="btn">COLLECTION</a>
  </div>
  <div class="footer">
    <p>© 2037 NIGHT CITY CORPORATION · ALL RIGHTS RESERVED</p>
  </div>
</div>

<script>
document.addEventListener("click", function() {
  let audio = document.getElementById("bgm");
  if (audio.paused) {
    audio.play();
  }
});
</script>

</body>
</html>
