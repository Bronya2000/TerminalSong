<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERPUNK 2037</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 引入3D模型库 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    /* 三体模型画布定位 */
    #threeBox {
      position: fixed;
      left: 30px;
      bottom: 30px;
      width: 220px;
      height: 220px;
      z-index: 5;
      pointer-events: auto;
    }
  </style>
</head>
<body>
<!-- 3D三体模型容器 -->
<div id="threeBox"></div>

<audio id="bgm" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">


<div class="container">
  <h1 class="glitch" data-text="CYBERPUNK 2037">CYBERPUNK 2037</h1>
  <h2 class="subglitch">Jarvis · Terminal Song</h2>

<script src="script.js"></script>
<script>
document.addEventListener("click", function() {
  let audio = document.getElementById("bgm");
  if (audio.paused) {
    audio.play();
  }
});
</script>

<!-- 三体3D星球模型代码 -->
<script>
let scene,camera,renderer,controls,sphere;
function initThree(){
  const box = document.getElementById('threeBox');
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60,1,0.1,1000);
  camera.position.z = 2.5;

  renderer = new THREE.WebGLRenderer({alpha:true,antialias:true});
  renderer.setSize(220,220);
  renderer.setClearColor(0x000000,0);
  box.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping = true;

  // 三体风格岩石星球材质
  const geo = new THREE.SphereGeometry(1,32,32);
  const mat = new THREE.MeshStandardMaterial({
    color:0x442266,
    roughness:0.9,
    metalness:0.1
  });
  sphere = new THREE.Mesh(geo,mat);
  scene.add(sphere);

  // 环境光+星光冷光
  const light1 = new THREE.AmbientLight(0x8866ff,0.4);
  const light2 = new THREE.PointLight(0x00ccff,1,10);
  light2.position.set(2,2,2);
  scene.add(light1,light2);

  animateThree();
}
function animateThree(){
  requestAnimationFrame(animateThree);
  controls.update();
  sphere.rotation.y += 0.003;
  renderer.render(scene,camera);
}
initThree();
</script>
</body>
</html>
