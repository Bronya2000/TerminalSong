<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERPUNK 2037</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* 旋转三角图腾样式 */
    .tri-icon{
      position:fixed;
      right:40px;
      bottom:40px;
      width:120px;
      height:120px;
      z-index:5;
      animation:round 12s linear infinite;
      filter:drop-shadow(0 0 12px #00e5ff);
    }
    @keyframes round{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }
  </style>
</head>
<body>

<!-- 旋转三角形图腾 -->
<svg class="tri-icon" viewBox="0 0 100 100" fill="none">
  <path d="M50 10 L90 85 L10 85 Z" stroke="#00e5ff" stroke-width="3" fill="transparent"/>
  <path d="M50 25 L75 70 L25 70 Z" stroke="#8b5cf6" stroke-width="2" fill="transparent"/>
</svg>

<audio id="bgm" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">


<div class="container">
  <h1 class="glitch" data-text="CYBERPUNK 2037">CYBERPUNK 2037</h1>

  </div>

  </div>
</div>

<script src="script.js"></script>
<script>
document.addEventListener("click", function() {
  let audio = document.getElementById("bgm");
  if (audio.paused) {
    audio.play();
  }
});
</script>

</body>
</html>
