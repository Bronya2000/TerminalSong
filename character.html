<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHARACTER | CYBERPUNK 2037</title>
  <link rel="icon" href="favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #050508;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      overflow-x: hidden;
    }
    h1 {
      font-size: 4rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 1.3rem;
      color: #f7ba00;
      text-shadow: 0 0 6px rgba(247, 186, 0, 0.5);
      letter-spacing: 2px;
      margin-bottom: 60px;
    }
    .camp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 800px;
      width: 100%;
      margin-bottom: 60px;
    }
    .camp-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .camp-card:hover {
      background: rgba(0, 255, 255, 0.08);
      border-color: rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.25);
      transform: translateY(-4px);
    }
    .camp-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #00ffff;
      letter-spacing: 1px;
    }
    .btn-back {
      padding: 12px 28px;
      background: transparent;
      border: 1px solid rgba(0, 255, 255, 0.4);
      border-radius: 8px;
      color: #00ffff;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-back:hover {
      background: rgba(0, 255, 255, 0.1);
      border-color: rgba(0, 255, 255, 0.8);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
    }
  </style>
</head>
<body>

<h1>CHARACTER</h1>
<div class="subtitle">角色阵营 · CHARACTER FACTIONS</div>

<div class="camp-grid">
  <a href="char-list.html?camp=中立阵营" class="camp-card">
    <div class="camp-title">中立阵营</div>
  </a>
  <a href="char-list.html?camp=特维拉阵营" class="camp-card">
    <div class="camp-title">特维拉阵营</div>
  </a>
  <a href="char-list.html?camp=科伦阵营" class="camp-card">
    <div class="camp-title">科伦阵营</div>
  </a>
</div>

<a href="index.html" class="btn-back">返回主页</a>

</body>
</html>
