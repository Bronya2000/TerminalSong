<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色列表</title>
  <style>
    body {
      background: #0b0427;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 50px 20px;
      margin: 0;
    }
    h1 {
      color: #f7ba00;
      font-size: 2rem;
      margin-bottom: 30px;
    }
    .char-btn {
      display: inline-block;
      background: rgba(0,0,0,0.4);
      border: 2px solid #00ffff;
      padding: 12px 20px;
      margin: 8px;
      border-radius: 8px;
      color: #00ffff;
      text-decoration: none;
      transition: 0.3s;
    }
    .char-btn:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 15px #00ffff;
    }
    .btn-back {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      border: 2px solid #00ffff;
      color: #00ffff;
      text-decoration: none;
      border-radius: 8px;
    }
    .btn-back:hover {
      background: #00ffff;
      color: #000;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-box {
      background: #0b0427;
      border: 2px solid #f7ba00;
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      color: #eee;
      line-height: 1.8;
    }
    .modal-box h3 {
      color: #f7ba00;
      margin-bottom: 15px;
    }
    .close {
      color: #f7ba00;
      float: right;
      font-size: 1.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1 id="camp-name"></h1>

<div id="char-container"></div>

<br><br>
<a href="character.html" class="btn-back">返回阵营列表</a>

<div id="modal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">×</span>
    <h3 id="modal-name"></h3>
    <p id="modal-desc"></p>
  </div>
</div>

<script>
const data = {
  "中立阵营": [
    { name: "洛", desc: "主角的亲友（最早剧情核心人物），性格纯善。温柔纯善、是主角心中的“白月光”，在末日混乱中惨死，成为了牺牲品。" },
    { name: "班德·卡萨克", desc: "马克西绿洲首领，在和坂枭军队混战中被俘虏，口中有流窜ai的情报。" }
  ],
  "特维拉阵营": [
    { name: "坂枭华子（重构天使）", desc: "原坂枭华子，科伦高级军士长，园区实际管理者之一（坂枭授权其协助主角），科伦势力核心成员，坂本枭之女，在和拓斋（贾维斯·希尔德）结识过后产生好感，坂枭势力覆灭后与贾维斯逃往北方寻求希尔德家族的庇佑，后来前往南方途中被流浪者家族绑架，被做实验，后来存在于relic作为意识体存在与贾维斯体内。" },
    { name: "贾维斯·希尔德", desc: "主角，原本是一名普通高三学生，孤儿，但是身世为北方贵族后裔，拥有很强的机械能力和射击能力，曾遭背叛失去手臂。" },
    { name: "埃德加", desc: "主角的同伴、助手，特维拉原某研究所技术人员，曾为俄罗斯阿尔法突击队小队成员，精通信息战术和医疗救治，经验丰富的求生者。" },
    { name: "K", desc: "出身卡萨克家族，前期和主角一行人结伴同行，知晓区域势力内情，性格谨慎，在列车遇袭动乱中不幸身亡，提前印证旧势力早已衰败。" },
    { name: "迪克文森", desc: "联络人，没人知道他在流浪者家族里有多大的势力。" }
  ],
  "科伦阵营": [
    { name: "坂本枭", desc: "科伦黑产帝国的土皇帝，华子生父，气场如同黑帮教父，心思极度多疑深沉，信奉宗教教义，杀伐果断不喜繁文缛节。擅长用多重手段试探人心，确认主角忠心后将整片园区与绿洲全权交付，手握大量黑暗交易资源。" },
    { name: "坂本华子", desc: "坂枭之女，园区实际管理者之一，外形明艳火辣，穿搭极具辨识度，性格双面反差。表面娇俏暧昧主动贴近主角，实则遵从父亲命令暗中试探主角忠诚度，心思玲珑，熟悉整片园区所有人脉与布防，游走在权势与情感之间。" },
    { name: "荒木拓斋", desc: "真实为十九岁首席执剑人，极少露面身份神秘，被北方势力半路截获，严刑逼供后全盘交代身份暗号、人脉规矩等所有信息，沦为主角替身的垫脚石。" },
    { name: "凯拉·普林斯顿", desc: "科伦联络人，会根据你的实用价值来为你派发任务，后期贾维斯回归科伦的重要中间人。" },
    { name: "坂本世雄", desc: "坂枭长子，对外宣称已故，实际上是坂枭的接班人，但是因为急功近利杀死了坂枭。" }
  ]
};

const camp = new URLSearchParams(location.search).get("camp");
document.getElementById("camp-name").innerText = camp;

const container = document.getElementById("char-container");
data[camp].forEach(item => {
  const a = document.createElement("a");
  a.className = "char-btn";
  a.innerText = item.name;
  a.onclick = () => showModal(item.name, item.desc);
  container.appendChild(a);
});

function showModal(name, desc) {
  document.getElementById("modal-name").innerText = name;
  document.getElementById("modal-desc").innerText = desc;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
