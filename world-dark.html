    <h3>核心背景</h3>
    <p>南北战事爆发后，交战区域因无法律约束、无秩序管控，被称为“暗区”，成为各大势力角逐、厮杀、掠夺的主战场，也是病毒泄露后感染最严重的区域之一。</p>
    <h3>核心势力</h3>
    <p><strong>科伦国防势力</strong>：科伦正规军，与黑金国际合作。</p>
    <p><strong>黑金国际</strong>：跨国雇佣兵与军工复合体。</p>
    <p><strong>特维拉势力</strong>：工业军事强国，拥有白狼联队、林中人。</p>
    <p><strong>苏梅克委员会</strong>：暗区搅局者，挑动冲突获利。</p>
    <p><strong>托兰德财团</strong>：科伦顶级财阀，军工能源巨头。</p>
  </div>
